<header class="sticky top-0 z-30 mx-auto w-full max-w-content px-4 pt-4 sm:px-6">
    <bh-navbar
        [navItems]="navItems"
        logoSrc="/assets/logo.svg"
        [groups]="categoryGroups()"
        searchPlaceholder="Search materials, tools…"
        (nav)="onNav($event)"
        (search)="onSearch($event)"
        (categoryNavigate)="onCategory($event)"
    >
        <div slot="actions" class="flex items-center gap-2 sm:gap-3">
            <app-lang-currency />
            <app-wishlist-badge />
            <app-cart-badge />
            <app-user-menu />
        </div>
    </bh-navbar>
</header>

<main class="mx-auto w-full max-w-content px-4 py-8 sm:px-6">
    <router-outlet />
</main>

<bh-footer [copyright]="footerCopyright()" [legal]="footerLegal" (legalClick)="onLegal($event)" />

<!-- Небольшой брендовый градиент под футером. -->
<div
    aria-hidden="true"
    class="h-24 w-full"
    style="background: linear-gradient(to bottom, rgb(var(--color-bg-deep)), rgb(var(--color-accent) / 0.06))"
></div>
