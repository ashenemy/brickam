<header class="sticky top-0 z-20">
    <bh-navbar (nav)="onNav($event)" />
    <div class="flex justify-end items-center gap-4 px-6 py-2 bg-bg-app">
        <a
            href="/catalog"
            routerLink="/catalog"
            class="text-text-primary hover:text-accent transition-colors duration-base cursor-pointer rounded-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[rgb(var(--color-accent))]"
            style="font: var(--type-label)"
            >Catalog</a
        >
        <a
            href="/ai"
            routerLink="/ai"
            class="text-text-primary hover:text-accent transition-colors duration-base cursor-pointer rounded-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[rgb(var(--color-accent))]"
            style="font: var(--type-label)"
            >Describe project</a
        >
        <a
            href="/calculators"
            routerLink="/calculators"
            class="text-text-primary hover:text-accent transition-colors duration-base cursor-pointer rounded-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[rgb(var(--color-accent))]"
            style="font: var(--type-label)"
            >Calculators</a
        >
        @if (session.isAuthenticated()) {
            <a
                href="/orders"
                routerLink="/orders"
                data-testid="nav-orders"
                class="text-text-primary hover:text-accent transition-colors duration-base cursor-pointer rounded-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[rgb(var(--color-accent))]"
                style="font: var(--type-label)"
                >My orders</a
            >
        }
        <app-loyalty-badge />
        <app-wishlist-badge />
        <app-cart-badge />
        <app-chat-badge />
        <app-currency-switcher />
        <bh-lang-switcher />
        @if (session.isAuthenticated()) {
            <button
                type="button"
                (click)="logout()"
                data-testid="nav-logout"
                class="text-text-primary hover:text-accent transition-colors duration-base cursor-pointer rounded-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[rgb(var(--color-accent))]"
                style="font: var(--type-label)"
            >
                Logout
            </button>
        } @else {
            <a
                href="/login"
                routerLink="/login"
                data-testid="nav-login"
                class="text-text-primary hover:text-accent transition-colors duration-base cursor-pointer rounded-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[rgb(var(--color-accent))]"
                style="font: var(--type-label)"
                >Login</a
            >
        }
    </div>
</header>

<main class="mx-auto w-full max-w-content px-6 py-10">
    <router-outlet />
</main>

<bh-footer />
