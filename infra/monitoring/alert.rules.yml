# Правила алертов Brickam. Группа `brickam` использует метрики, доступные по
# умолчанию (prom-client default metrics + признак up от Prometheus). Группы ниже
# (http / infra) опираются на ДОПОЛНИТЕЛЬНЫЕ метрики, которые поставляет
# инструментация приложения и экспортеры (см. комментарии у каждого правила) —
# код/таргеты заводятся отдельно; правила готовы и активируются, как только
# соответствующие серии появятся в Prometheus.
groups:
  - name: brickam
    rules:
      # Сервис не отвечает на scrape — самый важный алерт.
      - alert: ServerDown
        expr: up{job="brickam-server"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Brickam API недоступен'
          description: 'Цель {{ $labels.instance }} не отвечает дольше 1 минуты.'

      # Утечка/перегрузка по памяти (RSS > 1.5 ГБ).
      - alert: HighProcessMemory
        expr: process_resident_memory_bytes{job="brickam-server"} > 1.5e9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Высокое потребление памяти сервером'
          description: 'RSS превышает 1.5 ГБ более 5 минут ({{ $value | humanize1024 }}B).'

      # Лаг event loop — Node не успевает обрабатывать задачи.
      - alert: HighEventLoopLag
        expr: nodejs_eventloop_lag_seconds{job="brickam-server"} > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Высокий лаг event loop'
          description: 'Лаг event loop > 0.5s более 5 минут — возможна перегрузка CPU.'

  # HTTP-метрики: требуется гистограмма http_request_duration_seconds с меткой
  # status_code (её экспонирует HTTP-интерсептор сервера — код заводится отдельно).
  - name: brickam-http
    rules:
      # Доля 5xx-ответов > 1% за 5 минут.
      - alert: HighErrorRate
        expr: |
          sum(rate(http_request_duration_seconds_count{job="brickam-server",status_code=~"5.."}[5m]))
            /
          sum(rate(http_request_duration_seconds_count{job="brickam-server"}[5m]))
            > 0.01
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 'Высокая доля ошибок 5xx'
          description: 'Доля 5xx-ответов превышает 1% более 5 минут ({{ $value | humanizePercentage }}).'

      # p95 латентности запросов > 1s за 5 минут.
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="brickam-server"}[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Высокая латентность API (p95)'
          description: 'p95 времени ответа превышает 1s более 5 минут ({{ $value | humanizeDuration }}).'

  # Инфраструктурные зависимости: метрики поставляют экспортеры/инструментация
  # (bullmq-gauge приложения, redis_exporter, mongodb_exporter) — таргеты в
  # prometheus.yml и сами экспортеры заводятся отдельно.
  - name: brickam-infra
    rules:
      # Затор очереди BullMQ: ожидающих задач > 1000 более 10 минут (gauge
      # bullmq_queue_waiting{queue=...} экспонирует приложение).
      - alert: BullMQQueueBacklog
        expr: sum(bullmq_queue_waiting{job="brickam-server"}) > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'Затор очереди BullMQ'
          description: 'В очередях BullMQ скопилось {{ $value }} ожидающих задач более 10 минут — проверьте воркеры.'

      # Использование памяти Redis > 90% от maxmemory (метрики redis_exporter).
      - alert: RedisHighMemory
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.9
            and redis_memory_max_bytes > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Redis у предела памяти'
          description: 'Redis использует {{ $value | humanizePercentage }} maxmemory более 5 минут — риск вытеснения ключей/OOM.'

      # Mongo недоступен (метрика mongodb_up из mongodb_exporter).
      - alert: MongoDown
        expr: mongodb_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'MongoDB недоступна'
          description: 'mongodb_exporter сообщает mongodb_up=0 дольше 1 минуты — БД недоступна.'
