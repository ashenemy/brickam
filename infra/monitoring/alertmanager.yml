# Alertmanager — маршрутизация алертов от Prometheus к получателям.
# Маршрут по severity: critical → Slack + email (paging), warning → только Slack.
#
# ВАЖНО про секреты: Alertmanager валидирует конфиг при старте (URL/host:port),
# поэтому литералы вида ${VAR} сюда подставлять НЕЛЬЗЯ — контейнер не поднимется.
# Webhook Slack и пароль SMTP заданы через *_file: Alertmanager читает их в момент
# отправки из примонтированного файла-секрета — так секрет не попадает в git, а
# конфиг остаётся валидным. Альтернатива — рендерить шаблон через envsubst в
# entrypoint (`envsubst < alertmanager.tmpl.yml > alertmanager.yml`) из env.

global:
  resolve_timeout: 5m
  # TODO: примонтируйте файл с реальным Slack Incoming Webhook по этому пути
  # (docker secret / SSM-параметр / простой volume). Файл — одна строка с URL.
  slack_api_url_file: '/etc/alertmanager/secrets/slack_api_url'
  # SMTP по умолчанию для email_configs. Хост/отправитель — несекретные плейсхолдеры
  # валидного формата (host:port / email); пароль — из файла-секрета.
  # TODO: впишите реальный SMTP-хост (напр. AWS SES email-smtp.<region>.amazonaws.com:587).
  smtp_smarthost: 'smtp.example:587'
  smtp_from: 'alerts@buildhub.example'      # TODO: реальный from-адрес
  smtp_auth_username: 'CHANGEME'            # TODO: SMTP-логин (для SES — SMTP username)
  smtp_auth_password_file: '/etc/alertmanager/secrets/smtp_password'  # TODO: файл с паролем
  smtp_require_tls: true

route:
  receiver: slack-warnings
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  routes:
    # Critical — Slack + email (быстрее эскалация дежурному).
    - matchers: ['severity = critical']
      receiver: critical-pager
      continue: false

receivers:
  # Warning и всё прочее — в Slack-канал.
  - name: slack-warnings
    slack_configs:
      - channel: '#alerts'                  # TODO: укажите реальный канал
        send_resolved: true
        title: '{{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})'
        text: "{{ range .Alerts }}*{{ .Annotations.summary }}*\n{{ .Annotations.description }}\n{{ end }}"

  # Critical — Slack + email одновременно.
  - name: critical-pager
    slack_configs:
      - channel: '#alerts-critical'         # TODO: укажите реальный канал
        send_resolved: true
        title: ':rotating_light: {{ .CommonLabels.alertname }}'
        text: "{{ range .Alerts }}*{{ .Annotations.summary }}*\n{{ .Annotations.description }}\n{{ end }}"
    email_configs:
      - to: 'ops@buildhub.example'          # TODO: укажите реальный адрес дежурного
        send_resolved: true

# Подавление warning, если по тому же инстансу уже горит critical.
inhibit_rules:
  - source_matchers: ['severity = critical']
    target_matchers: ['severity = warning']
    equal: ['instance']
