# Prometheus — сбор метрик BuildHub + правила алертов → Alertmanager.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  # Метрики приложения (@willsoto/nestjs-prometheus → GET /api/metrics).
  - job_name: 'buildhub-server'
    metrics_path: /api/metrics
    static_configs:
      - targets: ['server:3000']

  # Самомониторинг Prometheus.
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
