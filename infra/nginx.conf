server {
    # :8080 — образ nginxinc/nginx-unprivileged работает под non-root (uid 101),
    # которому нельзя слушать привилегированные порты <1024 (см. infra/Dockerfile.*-web).
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: любые маршруты отдаём через index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статики
    location ~* \.(?:js|css|woff2?|png|jpe?g|svg|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
