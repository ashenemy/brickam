# =============================================================================
# Brickam — nginx reverse-proxy (edge)
# -----------------------------------------------------------------------------
# Назначение: поставить API и фронты на ОДИН origin (один домен), чтобы
# httpOnly-cookie с токенами (см. setAuthCookies в auth.controller.ts) работали
# БЕЗ cross-site. Если бы фронт жил на app.example.com, а API на api.example.com,
# браузер считал бы запросы cross-site (SameSite=Lax/Strict cookie не уходили бы,
# а SameSite=None требует Secure + усложняет CSRF). Один домен => cookie «свои».
#
# Карта апстримов (порты из infra/Dockerfile.*):
#   - server     :3000  — NestJS API (глобальный префикс /api, версии /api/v1/...)
#   - main-web   :4000  — Angular SSR (Node, отдаёт HTML + статику браузер-бандла)
#   - vendor-web :8080  — Angular CSR за non-root nginx (статика)
#   - admin-web  :8080  — Angular CSR за non-root nginx (статика)
#
# Имена хостов (server / main-web / vendor-web / admin-web) — это service-имена
# из docker-compose / DNS-имена в ECS (service discovery). При деплое в ECS
# впишите реальные имена/Cloud Map endpoints вместо них (см. комментарии ниже).
#
# Стратегия мульти-фронтов: выбраны ПОДДОМЕНЫ (vendor. / admin.). Покупательский
# фронт (main-web SSR) — на корне, кабинеты — на поддоменах. Все три делят домен
# второго уровня <DOMAIN>, поэтому API на <DOMAIN>/api/* остаётся same-site
# относительно apex; для cookie на поддоменах задайте Domain=.<DOMAIN> в
# setAuthCookies (cookie с Domain=.example.com видны и на example.com, и на
# vendor.example.com, и на admin.example.com). Альтернатива (path-based:
# /vendor, /admin на одном хосте) — закомментирована в конце файла.
#
# TLS: терминируется ВЫШЕ — на AWS ALB (ACM-сертификат на listener :443) или на
# CloudFront. Этот nginx слушает :80 за балансировщиком (внутренний трафик).
# Если терминируете TLS здесь — раскомментируйте 443-блок в самом низу.
# =============================================================================

# --- gzip (сжатие текстовых ответов) ----------------------------------------
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   5;
gzip_min_length   1024;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# --- общие proxy-параметры (вынесены, чтобы не дублировать) -------------------
proxy_http_version 1.1;

# Разумные таймауты: апстрим (API/SSR) не должен висеть вечно, но даём запас
# на «холодные» SSR-рендеры и тяжёлые ответы каталога.
proxy_connect_timeout 5s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Тело запроса (загрузка медиа идёт через presigned-URL S3, но оставим запас).
client_max_body_size  25m;

# Апстримы. В ECS замените server-имена на Cloud Map endpoints
# (например server.brickam.local) или на внутренний ALB апстрим.
upstream brickam_api {
    server server:3000;
    keepalive 32;
}
upstream brickam_main_web {
    server main-web:4000;
    keepalive 32;
}
upstream brickam_vendor_web {
    server vendor-web:8080;   # non-root nginx (nginxinc/nginx-unprivileged) слушает :8080
    keepalive 16;
}
upstream brickam_admin_web {
    server admin-web:8080;    # non-root nginx (nginxinc/nginx-unprivileged) слушает :8080
    keepalive 16;
}

# =============================================================================
# Покупательский фронт + API — apex-домен <DOMAIN>
#   ВПИШИТЕ реальный домен вместо <DOMAIN> (например example.com, www.example.com)
# =============================================================================
server {
    listen 80;
    # ВПИШИТЕ домен: server_name example.com www.example.com;
    server_name <DOMAIN> www.<DOMAIN>;

    # --- API: всё под /api/ проксируем на NestJS (порт 3000) ------------------
    # /api/v1/... (бизнес-роуты) и /api/health(/live|/ready), /api/metrics.
    # Сохраняем оригинальные заголовки/cookie: апстрим видит реальный Host и
    # схему (нужно для secure-cookie и для построения абсолютных ссылок/SEO).
    location /api/ {
        proxy_pass http://brickam_api;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # за TLS-балансировщиком — https
        proxy_set_header X-Forwarded-Host  $host;

        # Cookie проксируются как есть (Set-Cookie от API доходит до браузера
        # без переписывания домена — origin один и тот же).
        proxy_pass_request_headers on;

        # WebSocket/чат (chat.controller) — на случай upgrade-соединений.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # --- Всё остальное: SSR-фронт покупателя (main-web, порт 4000) ------------
    location / {
        proxy_pass http://brickam_main_web;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# =============================================================================
# Кабинет продавца — поддомен vendor.<DOMAIN> (CSR-статика за nginx)
# =============================================================================
server {
    listen 80;
    # ВПИШИТЕ: server_name vendor.example.com;
    server_name vendor.<DOMAIN>;

    # API на том же apex-домене: фронт вызывает https://<DOMAIN>/api/v1/...
    # (apiBaseUrl в config.vendor-web.prod.json), поэтому здесь /api/ можно
    # НЕ проксировать. Но если хотите держать API локально на поддомене —
    # раскомментируйте блок ниже (cookie тогда задавайте Domain=.<DOMAIN>):
    #
    # location /api/ {
    #     proxy_pass http://brickam_api;
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location / {
        proxy_pass http://brickam_vendor_web;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =============================================================================
# Админка — поддомен admin.<DOMAIN> (CSR-статика за nginx)
# =============================================================================
server {
    listen 80;
    # ВПИШИТЕ: server_name admin.example.com;
    server_name admin.<DOMAIN>;

    # Аналогично vendor: API берётся с apex https://<DOMAIN>/api/v1/...
    # (см. config.admin-web.prod.json). Для локального /api/ — раскомментируйте:
    #
    # location /api/ {
    #     proxy_pass http://brickam_api;
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    location / {
        proxy_pass http://brickam_admin_web;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =============================================================================
# Поддержка WebSocket-upgrade: map для Connection-заголовка.
# (вынесено вниз; nginx применяет map независимо от порядка)
# =============================================================================
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# =============================================================================
# (ОПЦИОНАЛЬНО) Path-based вместо поддоменов — один host, /vendor и /admin.
# Используйте ЭТОТ вариант, если не хотите выпускать сертификаты на поддомены
# и заводить vendor./admin. DNS-записи. Тогда УДАЛИТЕ два server-блока выше
# (vendor./admin.) и добавьте в apex-server такие location (порядок важен —
# более специфичные /vendor, /admin, /api идут ВЫШЕ корневого /):
#
#   location /vendor/ {
#       # vendor-web должен быть собран с base-href=/vendor/ (см. README)
#       proxy_pass http://brickam_vendor_web/;
#       proxy_set_header Host $host;
#       proxy_set_header X-Forwarded-Proto $scheme;
#   }
#   location /admin/ {
#       proxy_pass http://brickam_admin_web/;
#       proxy_set_header Host $host;
#       proxy_set_header X-Forwarded-Proto $scheme;
#   }
#
# Минус path-based: фронты нужно собирать с base-href=/vendor//admin/; плюс —
# не нужны wildcard-сертификат и доп. DNS. Cookie всегда same-site (один host).
# =============================================================================

# =============================================================================
# (ОПЦИОНАЛЬНО) TLS-терминация прямо здесь, если НЕ используете ALB/CloudFront.
# Раскомментируйте и впишите пути к сертификату (ACM экспортируется не везде —
# для self-managed nginx используйте Let's Encrypt / загруженный pem).
# =============================================================================
# server {
#     listen 443 ssl http2;
#     server_name <DOMAIN> www.<DOMAIN>;
#
#     ssl_certificate     /etc/nginx/certs/fullchain.pem;   # ВПИШИТЕ путь
#     ssl_certificate_key /etc/nginx/certs/privkey.pem;     # ВПИШИТЕ путь
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#
#     # ... те же location /api/ и / что и в :80-блоке ...
# }
#
# # Редирект http -> https (если TLS терминируется здесь):
# server {
#     listen 80;
#     server_name <DOMAIN> www.<DOMAIN>;
#     return 301 https://$host$request_uri;
# }
