pre-commit:
    parallel: false
    commands:
        biome:
            run: npx @biomejs/biome check --staged --write --no-errors-on-unmatched
            stage_fixed: true
        eslint:
            glob: '*.{ts,html}'
            run: npx eslint {staged_files}
        single-scope-guard:
            run: node tools/hooks/single-scope-guard.mjs
        # Блокирует коммит staged .env-файлов с плейсхолдерами change-me или
        # строками, похожими на реальные секреты (AWS-ключи, приватные ключи,
        # токены sk-/xox...). Node-скрипт — устойчив к шеллу/кавычкам на Windows.
        env-secret-guard:
            glob: '.env*'
            run: node tools/hooks/env-secret-guard.mjs

commit-msg:
    commands:
        commitlint:
            run: npx commitlint --edit {1}
