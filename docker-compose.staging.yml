# BuildHub — стейджинг: тянет опубликованные в GHCR образы по тегу $TAG.
# Деплой выполняет CD-пайплайн (cd.yml) на стейджинг-хосте: `docker compose
# -f docker-compose.staging.yml pull && up -d`, затем health-check /api/health.
# Секреты (SENTRY_DSN, ключи провайдеров) приходят из окружения хоста/секрет-менеджера.
# В проде на AWS эти сервисы заменяются managed-аналогами: MinIO→S3, GlitchTip→Sentry,
# Postgres/redis/mongo→RDS/ElastiCache/Atlas. Здесь — self-hosted для стейджинга.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin}; do sleep 2; done
        mc mb -p local/${S3_BUCKET:-buildhub}
        mc anonymous set download local/${S3_BUCKET:-buildhub}

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glitchtip}
    volumes:
      - pg-data:/var/lib/postgresql/data

  glitchtip-migrate:
    image: glitchtip/glitchtip
    restart: "no"
    command: ./manage.py migrate
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}

  glitchtip:
    image: glitchtip/glitchtip
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - glitchtip-migrate
    environment:
      DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}
      PORT: 8000
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8000}
      DEFAULT_FROM_EMAIL: noreply@buildhub.local
      CELERY_WORKER_AUTOSCALE: "1,3"
    ports:
      - "8000:8000"

  glitchtip-worker:
    image: glitchtip/glitchtip
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      - postgres
      - redis
      - glitchtip-migrate
    environment:
      DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}

  server:
    image: ghcr.io/${GHCR_OWNER:-buildhub}/buildhub-server:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
      - minio
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/buildhub
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SITE_URL: ${SITE_URL:-http://localhost:4000}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-buildhub}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/buildhub}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  main-web:
    image: ghcr.io/${GHCR_OWNER:-buildhub}/buildhub-main-web:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "4000:4000"

  vendor-web:
    image: ghcr.io/${GHCR_OWNER:-buildhub}/buildhub-vendor-web:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "4001:4000"

  admin-web:
    image: ghcr.io/${GHCR_OWNER:-buildhub}/buildhub-admin-web:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "4002:4000"

volumes:
  mongo-data:
  minio-data:
  pg-data:
