# BuildHub — стейджинг: тянет опубликованные в GHCR образы по тегу $TAG.
# Деплой выполняет CD-пайплайн (cd.yml) на стейджинг-хосте: `docker compose
# -f docker-compose.staging.yml pull && up -d`, затем health-check /api/health.
# Секреты (SENTRY_DSN, ключи провайдеров) приходят из окружения хоста/секрет-менеджера.
# В проде на AWS эти сервисы заменяются managed-аналогами: MinIO→S3, GlitchTip→Sentry,
# Postgres/redis/mongo→RDS/ElastiCache/Atlas. Здесь — self-hosted для стейджинга.
# deploy.resources.limits задают потолок CPU/RAM на сервис (Compose v2 применяет
# их и вне swarm) — защита стейджинг-хоста от перерасхода ресурсов.
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      # Нетривиальные дефолты (НЕ minioadmin) — переопределяются окружением хоста.
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-buildhub-local}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-buildhub-local-s3-secret}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-buildhub-local} ${S3_SECRET_ACCESS_KEY:-buildhub-local-s3-secret}; do sleep 2; done
        mc mb -p local/${S3_BUCKET:-buildhub}
        mc anonymous set download local/${S3_BUCKET:-buildhub}
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glitchtip}
    volumes:
      - pg-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  glitchtip-migrate:
    image: glitchtip/glitchtip
    restart: "no"
    command: ./manage.py migrate
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  glitchtip:
    image: glitchtip/glitchtip
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - glitchtip-migrate
    environment:
      DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}
      PORT: 8000
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8000}
      DEFAULT_FROM_EMAIL: noreply@buildhub.local
      CELERY_WORKER_AUTOSCALE: "1,3"
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  glitchtip-worker:
    image: glitchtip/glitchtip
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    depends_on:
      - postgres
      - redis
      - glitchtip-migrate
    environment:
      DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  server:
    image: ghcr.io/${GHCR_OWNER:-buildhub}/buildhub-server:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
      - minio
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/buildhub
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SITE_URL: ${SITE_URL:-http://localhost:4000}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-buildhub}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-buildhub-local}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-buildhub-local-s3-secret}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/buildhub}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  main-web:
    image: ghcr.io/${GHCR_OWNER:-buildhub}/buildhub-main-web:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "4000:4000"
    healthcheck:
      # SSR-сервер (Node) отдаёт корневую страницу на :4000.
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  vendor-web:
    image: ghcr.io/${GHCR_OWNER:-buildhub}/buildhub-vendor-web:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "4001:8080"
    healthcheck:
      # non-root nginx отдаёт index.html на :8080 (внутри контейнера).
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  admin-web:
    image: ghcr.io/${GHCR_OWNER:-buildhub}/buildhub-admin-web:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "4002:8080"
    healthcheck:
      # non-root nginx отдаёт index.html на :8080 (внутри контейнера).
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # Мониторинг. Конфиги монтируются из репозитория — на стейджинг-хосте должна
  # быть папка infra/monitoring/ рядом с этим compose (синхронизируется с репо).
  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    depends_on:
      - server
      - alertmanager
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  alertmanager:
    image: prom/alertmanager
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      # Нетривиальные дефолты (НЕ admin/admin) — переопределяются окружением хоста.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-buildhub}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-buildhub-local-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  mongo-data:
  minio-data:
  pg-data:
  prometheus-data:
  grafana-data:
