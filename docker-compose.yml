# BuildHub — локальный стек: Mongo + Redis + MinIO(S3) + GlitchTip(Sentry) + API + 3 web.
# Секреты/настройки — через env (см. .env.example). Конфиг сервера — config/*.toml.
services:
    mongo:
        image: mongo:7
        restart: unless-stopped
        ports:
            - '27017:27017'
        volumes:
            - mongo-data:/data/db

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - '6379:6379'

    # S3-совместимое хранилище медиа (dev-замена AWS S3).
    minio:
        image: minio/minio
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
            MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
        ports:
            - '9000:9000' # S3 API
            - '9001:9001' # веб-консоль
        volumes:
            - minio-data:/data
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 30s
            timeout: 5s
            retries: 3

    # Одноразовый init: создаёт бакет и открывает download-доступ для publicUrl.
    minio-init:
        image: minio/mc
        depends_on:
            - minio
        restart: 'no'
        entrypoint:
            - sh
            - -c
            - |
                until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-minioadmin} ${S3_SECRET_ACCESS_KEY:-minioadmin}; do sleep 2; done
                mc mb -p local/${S3_BUCKET:-buildhub}
                mc anonymous set download local/${S3_BUCKET:-buildhub}

    # Postgres для GlitchTip (Sentry-совместимый трекинг ошибок).
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: glitchtip
            POSTGRES_USER: glitchtip
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glitchtip}
        volumes:
            - pg-data:/var/lib/postgresql/data

    # Применение миграций GlitchTip (запускается один раз перед web/worker).
    glitchtip-migrate:
        image: glitchtip/glitchtip
        restart: 'no'
        command: ./manage.py migrate
        depends_on:
            - postgres
        environment:
            DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
            SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}

    # GlitchTip web: UI + приём событий. После старта создайте проект → получите DSN
    # → пропишите его в SENTRY_DSN сервера. Redis logical db 1 (приложение — db 0).
    glitchtip:
        image: glitchtip/glitchtip
        restart: unless-stopped
        depends_on:
            - postgres
            - redis
            - glitchtip-migrate
        environment:
            DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
            REDIS_URL: redis://redis:6379/1
            SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}
            PORT: 8000
            GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8000}
            DEFAULT_FROM_EMAIL: noreply@buildhub.local
            CELERY_WORKER_AUTOSCALE: '1,3'
        ports:
            - '8000:8000'

    glitchtip-worker:
        image: glitchtip/glitchtip
        restart: unless-stopped
        command: ./bin/run-celery-with-beat.sh
        depends_on:
            - postgres
            - redis
            - glitchtip-migrate
        environment:
            DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
            REDIS_URL: redis://redis:6379/1
            SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}

    server:
        build:
            context: .
            dockerfile: infra/Dockerfile.server
        restart: unless-stopped
        depends_on:
            - mongo
            - redis
            - minio
        environment:
            NODE_ENV: production
            MONGO_URI: mongodb://mongo:27017/buildhub
            REDIS_URL: redis://redis:6379
            JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
            SENTRY_DSN: ${SENTRY_DSN:-}
            SITE_URL: ${SITE_URL:-http://localhost:4000}
            # Хранилище медиа → MinIO. Бакет создаёт minio-init.
            S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
            S3_REGION: ${S3_REGION:-us-east-1}
            S3_BUCKET: ${S3_BUCKET:-buildhub}
            S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
            S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
            S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/buildhub}
            # SMS Twilio (если providers.sms=twilio в config/*.toml).
            TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
            TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
            TWILIO_FROM: ${TWILIO_FROM:-}
            ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
            VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
            FAL_API_KEY: ${FAL_API_KEY:-}
        ports:
            - '3000:3000'
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s

    main-web:
        build:
            context: .
            dockerfile: infra/Dockerfile.main-web
        restart: unless-stopped
        depends_on:
            - server
        ports:
            - '4000:4000'

    vendor-web:
        build:
            context: .
            dockerfile: infra/Dockerfile.vendor-web
        restart: unless-stopped
        depends_on:
            - server
        ports:
            - '4201:80'

    admin-web:
        build:
            context: .
            dockerfile: infra/Dockerfile.admin-web
        restart: unless-stopped
        depends_on:
            - server
        ports:
            - '4202:80'

    # Сбор метрик с /api/metrics + вычисление правил алертов.
    prometheus:
        image: prom/prometheus
        restart: unless-stopped
        depends_on:
            - server
            - alertmanager
        volumes:
            - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ./infra/monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
            - prometheus-data:/prometheus
        ports:
            - '9090:9090'

    # Маршрутизация алертов (UI http://localhost:9093; получатели — в alertmanager.yml).
    alertmanager:
        image: prom/alertmanager
        restart: unless-stopped
        volumes:
            - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
        ports:
            - '9093:9093'

    # Дашборды поверх Prometheus (UI http://localhost:3001; datasource+дашборд
    # подключаются автоматически из infra/monitoring/grafana/).
    grafana:
        image: grafana/grafana
        restart: unless-stopped
        depends_on:
            - prometheus
        environment:
            GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
            GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
            GF_USERS_ALLOW_SIGN_UP: 'false'
        volumes:
            - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
            - grafana-data:/var/lib/grafana
        ports:
            - '3001:3000'

volumes:
    mongo-data:
    minio-data:
    pg-data:
    prometheus-data:
    grafana-data:
