# Brickam — локальный стек: Mongo + Redis + MinIO(S3) + GlitchTip(Sentry) + API + 3 web.
# Секреты/настройки — через env (см. .env.example). Конфиг сервера — config/*.toml.
# deploy.resources.limits задают потолок CPU/RAM на сервис (Compose v2 применяет
# их и вне swarm) — чтобы один контейнер не выжрал всю машину разработчика.
services:
    mongo:
        image: mongo:7
        restart: unless-stopped
        ports:
            - '27017:27017'
        volumes:
            - mongo-data:/data/db
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 1024M

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            # Хост-порт переопределяется REDIS_PORT (на случай конфликта с другим
            # локальным redis); внутри сети сервисы всегда ходят в redis:6379.
            - '${REDIS_PORT:-6379}:6379'
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M

    # S3-совместимое хранилище медиа (dev-замена AWS S3).
    minio:
        image: minio/minio
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            # Нетривиальные dev-дефолты (НЕ minioadmin) — переопределяются в .env.
            MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-brickam-local}
            MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-brickam-local-s3-secret}
        ports:
            # Хост-порты переопределяются (конфликт с другим локальным S3/ClickHouse);
            # внутри сети всегда minio:9000. При смене MINIO_API_PORT задайте и
            # S3_PUBLIC_URL=http://localhost:<port>/<bucket> для отдачи медиа в браузер.
            - '${MINIO_API_PORT:-9000}:9000' # S3 API
            - '${MINIO_CONSOLE_PORT:-9001}:9001' # веб-консоль
        volumes:
            - minio-data:/data
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 30s
            timeout: 5s
            retries: 3
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M

    # Одноразовый init: создаёт бакет и открывает download-доступ для publicUrl.
    minio-init:
        image: minio/mc
        depends_on:
            - minio
        restart: 'no'
        entrypoint:
            - sh
            - -c
            - |
                until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID:-brickam-local} ${S3_SECRET_ACCESS_KEY:-brickam-local-s3-secret}; do sleep 2; done
                mc mb -p local/${S3_BUCKET:-brickam}
                mc anonymous set download local/${S3_BUCKET:-brickam}
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 128M

    # Postgres для GlitchTip (Sentry-совместимый трекинг ошибок).
    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: glitchtip
            POSTGRES_USER: glitchtip
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glitchtip}
        volumes:
            - pg-data:/var/lib/postgresql/data
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M

    # Применение миграций GlitchTip (запускается один раз перед web/worker).
    glitchtip-migrate:
        image: glitchtip/glitchtip
        restart: 'no'
        command: ./manage.py migrate
        depends_on:
            - postgres
        environment:
            DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
            SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M

    # GlitchTip web: UI + приём событий. После старта создайте проект → получите DSN
    # → пропишите его в SENTRY_DSN сервера. Redis logical db 1 (приложение — db 0).
    glitchtip:
        image: glitchtip/glitchtip
        restart: unless-stopped
        depends_on:
            - postgres
            - redis
            - glitchtip-migrate
        environment:
            DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
            REDIS_URL: redis://redis:6379/1
            SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}
            PORT: 8000
            GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8000}
            DEFAULT_FROM_EMAIL: noreply@brickam.local
            CELERY_WORKER_AUTOSCALE: '1,3'
        ports:
            - '8000:8000'
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 768M

    glitchtip-worker:
        image: glitchtip/glitchtip
        restart: unless-stopped
        command: ./bin/run-celery-with-beat.sh
        depends_on:
            - postgres
            - redis
            - glitchtip-migrate
        environment:
            DATABASE_URL: postgres://glitchtip:${POSTGRES_PASSWORD:-glitchtip}@postgres:5432/glitchtip
            REDIS_URL: redis://redis:6379/1
            SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-glitchtip-secret}
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 768M

    server:
        build:
            context: .
            dockerfile: infra/Dockerfile.server
        restart: unless-stopped
        depends_on:
            - mongo
            - redis
            - minio
        environment:
            # dev-режим в локальном Docker-стеке: грузит config/development.toml
            # (sms/payment=mock, CORS на localhost), CSRF off, обычные cookie по http.
            NODE_ENV: development
            MONGO_URI: mongodb://mongo:27017/brickam
            REDIS_URL: redis://redis:6379
            JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
            SENTRY_DSN: ${SENTRY_DSN:-}
            SITE_URL: ${SITE_URL:-http://localhost:4000}
            # Хранилище медиа → MinIO. Бакет создаёт minio-init.
            S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
            S3_REGION: ${S3_REGION:-us-east-1}
            S3_BUCKET: ${S3_BUCKET:-brickam}
            S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-brickam-local}
            S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-brickam-local-s3-secret}
            S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/brickam}
            # SMS Twilio (если providers.sms=twilio в config/*.toml).
            TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
            TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
            TWILIO_FROM: ${TWILIO_FROM:-}
            ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
            VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
            FAL_API_KEY: ${FAL_API_KEY:-}
        ports:
            - '3000:3000'
        healthcheck:
            test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 1024M

    main-web:
        build:
            context: .
            dockerfile: infra/Dockerfile.main-web
        restart: unless-stopped
        depends_on:
            - server
        ports:
            - '4000:4000'
        healthcheck:
            # SSR-сервер (Node) отдаёт корневую страницу на :4000.
            test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M

    vendor-web:
        build:
            context: .
            dockerfile: infra/Dockerfile.vendor-web
        restart: unless-stopped
        depends_on:
            - server
        ports:
            - '4201:8080'
        healthcheck:
            # non-root nginx отдаёт index.html на :8080 (внутри контейнера).
            test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 256M

    admin-web:
        build:
            context: .
            dockerfile: infra/Dockerfile.admin-web
        restart: unless-stopped
        depends_on:
            - server
        ports:
            - '4202:8080'
        healthcheck:
            # non-root nginx отдаёт index.html на :8080 (внутри контейнера).
            test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 256M

    # Сбор метрик с /api/metrics + вычисление правил алертов.
    prometheus:
        image: prom/prometheus
        restart: unless-stopped
        depends_on:
            - server
            - alertmanager
        volumes:
            - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ./infra/monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
            - prometheus-data:/prometheus
        ports:
            - '9090:9090'
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M

    # Маршрутизация алертов (UI http://localhost:9093; получатели — в alertmanager.yml).
    alertmanager:
        image: prom/alertmanager
        restart: unless-stopped
        volumes:
            - ./infra/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
        ports:
            - '9093:9093'
        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 256M

    # Дашборды поверх Prometheus (UI http://localhost:3001; datasource+дашборд
    # подключаются автоматически из infra/monitoring/grafana/).
    grafana:
        image: grafana/grafana
        restart: unless-stopped
        depends_on:
            - prometheus
        environment:
            # Нетривиальные dev-дефолты (НЕ admin/admin) — переопределяются в .env.
            GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-brickam}
            GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-brickam-local-grafana}
            GF_USERS_ALLOW_SIGN_UP: 'false'
        volumes:
            - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
            - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
            - grafana-data:/var/lib/grafana
        ports:
            - '3001:3000'
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M

volumes:
    mongo-data:
    minio-data:
    pg-data:
    prometheus-data:
    grafana-data:
